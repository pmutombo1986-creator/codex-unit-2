<!-- Level 9 starter: From div to Semantic Elements -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refactor challenge</title>
  </head>
  <body>
    <!-- TODO: Refactor this non-semantic layout into semantic elements without changing meaning -->
    <!-- Before : too many divs --> 
    <div class="layout">
      <div class="topbar"><h2>Logo</h2></div>
      <div class="menu"><a href="#">Menu</a></div>
      <div class="content">
        <h3>Content</h3>
        <p>Some text</p>
      </div>
      <div class="foot">Contact info</div>
    </div>
    <!-- After: semantic elements-->
     <header>
        <nav>
          <h2>Logo</h2>
          <a href="#">Menu</a>
        </nav>
     <main>
        <h3>Content</h3>
        <p>Some text</p>
    </main>
    <footer> Contact info</footer>
    </header>
  </body>
</html>
