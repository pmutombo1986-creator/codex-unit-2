<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 09</title>
  </head>
  <body>
    <h1>User Info</h1>
    <form>
        <fieldset>
          <legend>Login</legend>
          <label>
            Email:
            <input type="email" required />
          </label>
          <br />
          <label>
            Password:
            <input type="password" required />
          </label>
          <br />
          <button type="submit">Login</button>
        </fieldset>

        <fieldset>
          <legend>Profile</legend>
          <lable>Height:</lable>
          <input type="range" min="48" max="96" />
          <br />
          <label>Phone:</label>
          <input type="tel" minlength="10" maxlength="10" />
          <br />
          <label>Age:</label>
          <input type="number" />
          <br />
          <label>Picture:</label>
          <input type="file" />
          <br />
        </fieldset>
      <!-- TODO: Add required attributes and minlength/maxlength where appropriate -->
      <!-- TODO: If using a range input, include min and max -->
    </form>
  </body>
</html>
